name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install backend test dependencies
        working-directory: backend
        run: python -m pip install -e '.[test]'
      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

  frontend:
    name: Frontend lint, typecheck, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run frontend:lint
      - name: Typecheck frontend
        run: npm run --workspace frontend typecheck
      - name: Build frontend
        run: npm run frontend:build

  docs-and-secrets:
    name: Docs and secret checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install pre-commit
        run: python -m pip install pre-commit gitlint
      - name: Run pre-commit checks
        env:
          PRE_COMMIT_HOME: ${{ runner.temp }}/pre-commit-cache
        run: pre-commit run --all-files
