name: Feature request
description: Propose a scoped product, docs, or repo improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: user-problem
    attributes:
      label: User problem
      description: Which foreign resident, operator, or contributor problem does this reduce?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Data/RAG
        - Safety/Privacy
        - Docs/Report
        - CI/Repo
        - Database planning
    validations:
      required: true
  - type: input
    id: target-region-topic-language
    attributes:
      label: Target region/topic/language
      placeholder: "Example: Gwangju / health insurance / easy Korean and Vietnamese"
    validations:
      required: false
  - type: textarea
    id: official-source-impact
    attributes:
      label: Official-source impact
      description: Which official source, source inventory entry, or citation behavior would change?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: What should this explicitly not include?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: checkboxes
    id: safety-checks
    attributes:
      label: Safety and privacy checks
      options:
        - label: This does not require storing raw user questions by default.
          required: true
        - label: This does not require committing secrets or private account details.
          required: true
        - label: This does not claim final personal legal, medical, immigration, labor, insurance, or housing judgment.
          required: true
